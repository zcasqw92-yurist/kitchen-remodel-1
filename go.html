<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background: #f8fafc;
      color: #111827;
    }

    .redirect-card {
      max-width: 420px;
      margin: 24px;
      padding: 24px;
      text-align: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 16px;
      border: 4px solid rgba(17, 24, 39, 0.12);
      border-top-color: #111827;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    p {
      margin: 0;
      line-height: 1.55;
      color: #4b5563;
    }

    a {
      color: #0f5bd3;
      font-weight: 700;
      text-decoration: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://trkmcl.com/7o4z7mo89q/d8qw9z7l8o">
  </noscript>
</head>
<body>
  <div class="redirect-card">
    <div class="spinner" aria-hidden="true"></div>
    <p>Redirecting you to the next step...</p>
    <p style="margin-top: 10px;">If nothing happens, <a id="fallback-link" href="https://trkmcl.com/7o4z7mo89q/d8qw9z7l8o">click here</a>.</p>
  </div>
  <script>
    (() => {
      const targetBase = 'https://trkmcl.com/7o4z7mo89q/d8qw9z7l8o';
      const query = window.location.search || '';
      const targetUrl = targetBase + query;
      const fallback = document.getElementById('fallback-link');
      if (fallback) fallback.href = targetUrl;
      window.location.replace(targetUrl);
    })();
  </script>
</body>
</html>
